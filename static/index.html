<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Solar O&M Agent</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0b1120; color:#e5e7eb; }
.page { max-width:1400px; margin:auto; padding:20px; }

.header { display:flex; justify-content:space-between; margin-bottom:20px; }
.source { background:#052e16; border:1px solid #16a34a; padding:6px 12px; border-radius:20px; }

.main { display:grid; grid-template-columns:2fr 1fr; gap:20px; }

.panel { background:#111827; padding:16px; border-radius:12px; }

.kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.kpi { padding:12px; border-radius:10px; background:#172033; }
.kpi.red { border-left:6px solid #ef4444; }
.kpi.yellow { border-left:6px solid #f59e0b; }
.kpi.green { border-left:6px solid #22c55e; }
.kpi.blue { border-left:6px solid #38bdf8; }

.chart { height:280px; }

.alerts { display:flex; flex-direction:column; gap:10px; }

.alert { padding:10px; border-radius:10px; }
.alert.red { background:#7f1d1d; }
.alert.yellow { background:#78350f; }
.alert.green { background:#14532d; }

.chat { display:flex; flex-direction:column; height:80vh; }
.chat-box { flex:1; overflow:auto; background:#020617; padding:10px; border-radius:10px; }

.msg { margin:5px 0; padding:8px; border-radius:10px; }
.msg.user { background:#075985; margin-left:auto; }
.msg.bot { background:#1e293b; }

input { width:100%; padding:10px; margin-top:10px; background:#020617; color:white; border:1px solid #334155; }

button { padding:10px; background:#38bdf8; border:none; border-radius:8px; cursor:pointer; }

</style>
</head>

<body>
<div class="page">

<div class="header">
  <div>
    <h2>Solar O&M Agent</h2>
    <div>Diagnóstico automático desde Google Sheets</div>
  </div>
  <div class="source">Google Sheets</div>
</div>

<div class="main">

<!-- LEFT -->
<div>

<div class="kpis">
  <div class="kpi blue">Total<br><b id="kpiTotal">-</b></div>
  <div class="kpi red">Críticas<br><b id="kpiCrit">-</b></div>
  <div class="kpi yellow">Medias<br><b id="kpiMed">-</b></div>
  <div class="kpi green">Bajas<br><b id="kpiLow">-</b></div>
</div>

<div class="panel">
  <h3>Tendencia operacional</h3>
  <canvas id="trendChart" class="chart"></canvas>
</div>

<div class="panel">
  <h3>Distribución de alertas</h3>
  <canvas id="alertChart" class="chart"></canvas>
</div>

<div class="panel">
  <h3>Diagnóstico</h3>
  <div id="diagnosis"></div>
</div>

<div class="panel">
  <h3>Alertas</h3>
  <div id="alerts" class="alerts"></div>
</div>

</div>

<!-- RIGHT -->
<div class="chat panel">
  <h3>Chat experto</h3>
  <div id="chatBox" class="chat-box"></div>
  <input id="q" placeholder="Haz una pregunta..." />
  <button onclick="ask()">Enviar</button>
</div>

</div>
</div>

<script>
let lastAnalysis=null;
let lastData=null;

let trendChart=null;
let alertChart=null;

async function fetchAnalysis(){
  const res=await fetch("/last-analysis");
  const j=await res.json();
  if(j.status==="ok"){
    lastAnalysis=j.analysis;
    lastData=j.data;
    render(j.analysis,j.data);
  }
}

setInterval(fetchAnalysis,5000);
fetchAnalysis();

function render(a,data){

  const r=a.resumen;

  kpiTotal.innerText=r.total_alertas;
  kpiCrit.innerText=r.criticas;
  kpiMed.innerText=r.medias;
  kpiLow.innerText=r.bajas;

  diagnosis.innerHTML="<b>"+r.riesgo_principal+"</b>";

  // ALERTAS
  alerts.innerHTML="";
  a.alertas.forEach(x=>{
    let c="green";
    if(x.criticidad.includes("crit")) c="red";
    else if(x.criticidad.includes("med")) c="yellow";

    alerts.innerHTML+=`
      <div class="alert ${c}">
        ${x.equipo} → ${x.anomalia}
      </div>
    `;
  });

  // TREND
  if(trendChart) trendChart.destroy();

  trendChart=new Chart(trendChartCanvas(),{
    type:'line',
    data:{
      labels:data.map(d=>d.timestamp),
      datasets:[
        {label:'Potencia',data:data.map(d=>d.potencia),borderColor:'#38bdf8'},
        {label:'Irradiancia',data:data.map(d=>d.irradiancia),borderColor:'#facc15'}
      ]
    }
  });

  // ALERT CHART
  if(alertChart) alertChart.destroy();

  alertChart=new Chart(alertChartCanvas(),{
    type:'bar',
    data:{
      labels:['Críticas','Medias','Bajas'],
      datasets:[{
        data:[r.criticas,r.medias,r.bajas],
        backgroundColor:['#ef4444','#f59e0b','#22c55e']
      }]
    }
  });

}

function trendChartCanvas(){
  return document.getElementById("trendChart");
}

function alertChartCanvas(){
  return document.getElementById("alertChart");
}

async function ask(){
  const qv=q.value;
  if(!qv || !lastAnalysis) return;

  addMsg(qv,"user");

  const res=await fetch("/chat",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({question:qv,analysis:lastAnalysis})
  });

  const j=await res.json();
  addMsg(j.respuesta,"bot");
  q.value="";
}

function addMsg(t,type){
  chatBox.innerHTML+=`<div class="msg ${type}">${t}</div>`;
  chatBox.scrollTop=chatBox.scrollHeight;
}
</script>

</body>
</html>
