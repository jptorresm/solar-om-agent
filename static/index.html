<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solar O&M Agent</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#0b1120; color:#e5e7eb; }
.page { max-width:1400px; margin:auto; padding:20px; }

.header { display:flex; justify-content:space-between; margin-bottom:20px; }

.main { display:grid; grid-template-columns:2fr 1fr; gap:20px; }

.panel { background:#111827; padding:16px; border-radius:12px; margin-bottom:15px; }

.kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.kpi { padding:12px; border-radius:10px; background:#172033; }
.kpi.blue { border-left:6px solid #38bdf8; }
.kpi.red { border-left:6px solid #ef4444; }
.kpi.yellow { border-left:6px solid #f59e0b; }
.kpi.green { border-left:6px solid #22c55e; }

.chart { height:260px; }

.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }

.alert { padding:10px; border-radius:10px; margin-bottom:8px; }
.red { background:#7f1d1d; }
.yellow { background:#78350f; }
.green { background:#14532d; }

.chat { display:flex; flex-direction:column; height:520px; }
.chat-box { flex:1; overflow:auto; background:#020617; padding:10px; border-radius:10px; }

.msg { margin:5px 0; padding:8px; border-radius:10px; }
.user { background:#075985; margin-left:auto; }
.bot { background:#1e293b; }

input { width:100%; padding:10px; margin-top:10px; background:#020617; color:white; border:1px solid #334155; }

button { padding:10px; background:#38bdf8; border:none; border-radius:8px; cursor:pointer; }

.center { text-align:center; font-size:13px; margin-top:8px; }

canvas { width:100%; height:100%; }
</style>
</head>

<body>
<div class="page">

<div class="header">
  <div>
    <h2>Solar O&M Agent</h2>
    <div>Diagnóstico automático</div>
  </div>
</div>

<div class="main">

<!-- LEFT -->
<div>

<div class="kpis">
  <div class="kpi blue">Total<br><b id="kpiTotal">-</b></div>
  <div class="kpi red">Críticas<br><b id="kpiCrit">-</b></div>
  <div class="kpi yellow">Medias<br><b id="kpiMed">-</b></div>
  <div class="kpi green">Bajas<br><b id="kpiLow">-</b></div>
</div>

<div class="panel">
  <h3>Tendencia operacional</h3>
  <canvas id="trendChart" class="chart"></canvas>
</div>

<div class="grid2">

  <div class="panel">
    <h3>Estado de equipos</h3>
    <canvas id="pie"></canvas>
    <div class="center">OK vs con alerta</div>
  </div>

  <div class="panel">
    <h3>Diagnóstico general</h3>
    <div id="diagnosis"></div>
  </div>

</div>

<div class="panel">
  <h3>Análisis preventivo</h3>
  <div id="trends"></div>
</div>

<div class="panel">
  <h3>Alertas</h3>
  <div id="alerts"></div>
</div>

</div>

<!-- RIGHT -->
<div>

<div class="panel">
  <h3>Fuente de datos</h3>
  Google Sheets / Manual
</div>

<div class="panel chat">
  <h3>Chat experto</h3>
  <div id="chatBox" class="chat-box"></div>
  <input id="q" placeholder="Haz una pregunta..." />
  <button onclick="ask()">Enviar</button>
</div>

</div>

</div>
</div>

<script>

let lastAnalysis=null;
let lastData=null;

async function load(){
  const res=await fetch("/last-analysis");
  const j=await res.json();

  if(j.status==="ok"){
    lastAnalysis=j.analysis;
    lastData=j.data || [];
    render(j.analysis,lastData);
  }
}

setInterval(load,5000);
load();

function render(a,data){

  const r=a.resumen;

  kpiTotal.innerText=r.total_alertas;
  kpiCrit.innerText=r.criticas;
  kpiMed.innerText=r.medias;
  kpiLow.innerText=r.bajas;

  diagnosis.innerHTML=r.riesgo_principal;

  // ALERTAS
  alerts.innerHTML="";
  a.alertas.forEach(x=>{
    let c="green";
    if(x.criticidad.includes("crit")) c="red";
    else if(x.criticidad.includes("med")) c="yellow";

    alerts.innerHTML+=`<div class="alert ${c}">${x.equipo} → ${x.anomalia}</div>`;
  });

  drawPie(a,data);
  drawTrend(data);

  // PREVENTIVO
  let html="";
  (a.tendencias||[]).forEach(t=>{
    html+=`<div class="alert yellow">${t.equipo} → ${t.detalle}</div>`;
  });
  trends.innerHTML=html||"Sin señales";

}

function drawPie(a,data){
  const canvas=document.getElementById("pie");
  const ctx=canvas.getContext("2d");

  const size=250;
  canvas.width=size;
  canvas.height=size;

  ctx.clearRect(0,0,size,size);

  if(!data.length) return;

  const equipos=[...new Set(data.map(x=>x.equipo))];
  const conAlerta=[...new Set(a.alertas.map(x=>x.equipo))];

  const ok=equipos.length-conAlerta.length;
  const bad=conAlerta.length;
  const total=ok+bad||1;

  let start=-Math.PI/2;

  [ok,bad].forEach((v,i)=>{
    const angle=(v/total)*2*Math.PI;

    ctx.beginPath();
    ctx.moveTo(125,125);
    ctx.arc(125,125,90,start,start+angle);
    ctx.fillStyle=i===0?"#22c55e":"#ef4444";
    ctx.fill();

    start+=angle;
  });
}

function drawTrend(data){

  const canvas=document.getElementById("trendChart");
  const ctx=canvas.getContext("2d");

  const w=canvas.parentElement.clientWidth;
  const h=260;

  canvas.width=w;
  canvas.height=h;

  ctx.clearRect(0,0,w,h);

  if(!data.length) return;

  const values=data.map(x=>x.corriente || x.potencia || 0);
  const max=Math.max(...values,1);

  ctx.beginPath();
  values.forEach((v,i)=>{
    const x=i*(w/(values.length-1));
    const y=h-(v/max)*h;
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.strokeStyle="#38bdf8";
  ctx.stroke();
}

async function ask(){

  const input=document.getElementById("q");
  const question=input.value.trim();

  if(!question) return;

  if(!lastAnalysis){
    addMsg("Primero ejecuta análisis","bot");
    return;
  }

  addMsg(question,"user");
  input.value="";

  const res=await fetch("/chat",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({question:question,analysis:lastAnalysis})
  });

  const j=await res.json();

  addMsg(j.respuesta || "Error","bot");
}

function addMsg(text,type){
  const box=document.getElementById("chatBox");
  box.innerHTML+=`<div class="msg ${type}">${text}</div>`;
  box.scrollTop=box.scrollHeight;
}

// ENTER
document.getElementById("q").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    e.preventDefault();
    ask();
  }
});

</script>
</body>
</html>
